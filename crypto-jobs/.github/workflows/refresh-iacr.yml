name: Refresh IACR job listings

# Polls the IACR jobs RSS feed every 6 hours, classifies new entries, and
# opens a pull request for human review before they appear on the site.

on:
  schedule:
    - cron: "0 */6 * * *"        # every 6 hours
  workflow_dispatch: {}          # also allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser pyyaml

      - name: Fetch IACR jobs RSS
        run: python scripts/fetch_iacr_jobs.py

      - name: Open / update PR if there are new entries
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(positions): refresh from IACR jobs RSS"
          title: "chore(positions): refresh from IACR jobs RSS"
          branch: bot/iacr-refresh
          base: main
          delete-branch: true
          add-paths: |
            _data/positions.iacr.auto.yml
          body: |
            This PR is auto-generated by `.github/workflows/refresh-iacr.yml`.

            It compares the IACR Jobs RSS feed (https://iacr.org/jobs/rss.xml)
            against entries already in `_data/positions.yml` and stages any
            new ones in `_data/positions.iacr.auto.yml`.

            **To merge:** review the staged entries, copy the ones you want
            into `_data/positions.yml` (so they appear on the site), then
            close this PR or merge it as-is to preserve the audit trail.

            Skipping a position is fine — closed PRs are not held against
            future refreshes; the next run only stages positions still
            visible in the RSS feed and not already in `positions.yml`.

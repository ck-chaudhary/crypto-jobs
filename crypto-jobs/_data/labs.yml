# =========================================================================
#  labs.yml — Cryptography research groups & labs worldwide
# =========================================================================
#
#  Fields:
#    name*        — Group / lab / centre name
#    institution* — University / company
#    country      — Free-text (display only)
#    region*      — india | europe | north_america | asia_pacific | middle_east | africa | remote
#    link*        — Group homepage
#    area         — List from the shared taxonomy (mpc, fhe, fss, zk, pqc,
#                   lattice, symmetric, hardware, ppml, sse, blockchain,
#                   formal_methods, side_channel)
#    people       — A few faculty / leads associated with the group
#    note         — Short description shown on the card
#
#  * = required
#
#  NOTE: Faculty move and groups evolve — this list is curated and may be
#  out of date. Always check the group homepage before reaching out, and
#  open an issue/PR to correct or add an entry.
# =========================================================================


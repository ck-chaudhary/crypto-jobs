# =========================================================================
#  scholarships.yml — Scholarships & fellowships worldwide that fund
#  cryptography, security & privacy research (plus generic ones a
#  cryptographer is eligible for).
# =========================================================================
#
#  Fields:
#    name*        — Scholarship / fellowship name
#    provider*    — Funding body (DAAD, EU, Google, NSF, …)
#    level*       — masters | phd | postdoc | faculty | any
#                   (career stage the funding targets)
#    region*      — Host region where the award is tenable:
#                   india | europe | north_america | asia_pacific |
#                   middle_east | africa | worldwide
#    country      — Host country / countries (display only)
#    eligibility  — Short note on who may apply (nationality, degree, …)
#    focus*       — What research it fits, from the shared taxonomy:
#                   cryptography | security | privacy | generic
#                   (`generic` = open to any field, so a cryptographer
#                    qualifies even though it isn't crypto-specific)
#    funding      — One line on what it covers
#    link*        — Official details / application page
#    deadline*    — ISO date (2026-10-31), "rolling", or "annual"
#                   ("annual" = recurring yearly; check the link for the
#                    exact current-cycle date, noted where known)
#    posted       — When the provider opened / advertised this cycle
#    added        — When it landed here (drives the NEW badge)
#    status       — open | annual | rolling | closed
#    note         — Short comment shown on the card
#    source       — direct (curated) | scrape (auto-extracted, review-gated)
#
#  * = required
#
#  Deadlines for recurring programmes shift a little every year. This list
#  is curated and may lag the official page — ALWAYS confirm the current
#  deadline and eligibility on the provider's site before applying.
#  Corrections & additions welcome via PR (see the Submit link in the header).
# =========================================================================


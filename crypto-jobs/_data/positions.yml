#    region*     — india | europe | north_america | asia_pacific | middle_east | africa | remote
#    country     — Free-text (display only)
#    institution — Free-text
#    pi          — PI / contact person (optional)
#    link*       — Apply URL or PI page
#    deadline    — ISO date "YYYY-MM-DD" or "rolling"
#    posted      — ISO date the listing was first seen
#    area        — List from: mpc, fhe, fss, zk, pqc, lattice, symmetric, hardware,
#                            ppml, sse, blockchain, formal_methods, side_channel
#    status*     — open | standing | contact | expired
#    note        — Short free-text comment shown on the card
#    source      — Where the listing was found (iacr / direct / referral / scraper)
#
#  * = required
# =========================================================================


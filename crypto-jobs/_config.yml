title: Cryptography Research Positions
description: >-
  A live, filterable index of postdoc, research-scientist, faculty,
  internship and visiting-researcher positions in cryptography
  (MPC, FHE, ZK, PQC, PPML, hardware security, applied crypto)
  — India and abroad.
url: "https://ck-chaudhary.github.io"
baseurl: "/crypto-jobs"

markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude these from the built site
exclude:
  - README.md
  - scripts/
  - Gemfile
  - Gemfile.lock
  - vendor/

# Filter taxonomies — keep these in sync with _data/positions.yml tags
filter_groups:
  type:
    label: "Position type"
    options: [postdoc, research_scientist, faculty, intern, visiting, phd]
  region:
    label: "Region"
    options: [india, europe, north_america, asia_pacific, middle_east, africa, remote]
  area:
    label: "Research area"
    options: [mpc, fhe, fss, zk, pqc, lattice, symmetric, hardware, ppml, sse, blockchain, formal_methods, side_channel]
  status:
    label: "Status"
    options: [open, standing, contact, expired]

# Scholarship taxonomies — keep in sync with _data/scholarships.yml tags
scholarship_groups:
  level:
    label: "Career stage"
    options: [masters, phd, postdoc, faculty, any]
  region:
    label: "Host region"
    options: [india, europe, north_america, latin_america, asia_pacific, middle_east, africa, worldwide]
  focus:
    label: "Research focus"
    options: [cryptography, security, privacy, generic]
  status:
    label: "Status"
    options: [open, annual, rolling, closed]

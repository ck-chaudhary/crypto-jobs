name: Refresh IACR job listings

# Scrapes the IACR jobs board (https://iacr.org/jobs/) every 6 hours,
# appends any new entries straight into crypto-jobs/_data/positions.yml,
# commits to main, then dispatches deploy.yml to rebuild and publish.

on:
  schedule:
    - cron: "0 */6 * * *"        # every 6 hours
  workflow_dispatch: {}          # also allow manual trigger

permissions:
  contents: write
  actions: write        # needed to dispatch the deploy workflow

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Scrape IACR jobs board and append new entries
        working-directory: crypto-jobs
        run: python scripts/fetch_iacr_jobs.py

      - name: Commit, push, and deploy if there are new entries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- crypto-jobs/_data/positions.yml; then
            echo "No new positions; nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crypto-jobs/_data/positions.yml
          git commit -m "chore(positions): auto-append new IACR jobs board entries"
          git push
          # A push made with GITHUB_TOKEN does not trigger deploy.yml's
          # `on: push`, so dispatch the deploy workflow explicitly.
          gh workflow run deploy.yml --ref main

      - name: Keepalive (stop GitHub auto-disabling the 6-hour schedule)
        run: |
          # GitHub disables a scheduled workflow after 60 days with no repo
          # activity. During quiet spells the scrape commits nothing, so the
          # clock keeps ticking. If the last commit is getting old, push a tiny
          # timestamp commit to reset it. Committed via GITHUB_TOKEN, so it does
          # not trigger an unnecessary deploy.
          age_days=$(( ( $(date +%s) - $(git log -1 --format=%ct) ) / 86400 ))
          if [ "$age_days" -ge 45 ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-refresh.txt
            git add .github/last-refresh.txt
            git commit -m "chore: keepalive to keep the IACR refresh schedule enabled"
            git push
          else
            echo "Last commit ${age_days}d ago; schedule healthy, no keepalive needed."
          fi
